<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>CyberYimein · AI Agent Engineer</title>
    <meta name="description" content="AI agent and LLM automation engineer crafting multi-agent workflows, vibe coding pipelines, and production-ready experimentation." />
    <meta name="keywords" content="CyberYimein, AI Agent, LLM, Vibe Coding, MCP, Automation" />
    <meta name="author" content="CyberYimein" />
    <link rel="canonical" href="https://cyberyimein.github.io/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="zh_CN" />
    <meta property="og:title" content="CyberYimein · AI Agent Engineer" />
    <meta property="og:description" content="AI agent and LLM automation engineer crafting multi-agent workflows, vibe coding pipelines, and production-ready experimentation." />
    <meta property="og:url" content="https://cyberyimein.github.io/" />
    <meta property="og:site_name" content="CyberYimein" />
    <meta property="og:image" content="https://cyberyimein.github.io/og-cover.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="CyberYimein — AI agent engineer" />
    <meta property="og:locale:alternate" content="en_US" />
    <meta property="og:locale:alternate" content="ja_JP" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="CyberYimein · AI Agent Engineer" />
    <meta name="twitter:description" content="AI agent and LLM automation engineer crafting multi-agent workflows, vibe coding pipelines, and production-ready experimentation." />
    <meta name="twitter:image" content="https://cyberyimein.github.io/og-cover.png" />
    <meta name="twitter:creator" content="@cyberyimein" />

    <!-- PWA / Icons -->
    <link rel="icon" type="image/png" href="./assets/favicon.png" />
    <link rel="icon" type="image/svg+xml" href="./assets/favicon.svg" />
    <link rel="apple-touch-icon" href="./assets/icon-192.png" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <meta name="theme-color" content="#EBEBEB" />
    <!-- 主题：NASA Industrial Punk -->
    <link rel="stylesheet" href="./assets/css/nasa.css" />
    <!-- 如需回退深色霓虹版本，改为： ./assets/css/style.css -->
</head>

<body>
    <!-- Canvas 背景：神经元/星座粒子系统 -->
    <canvas id="canvas-bg"></canvas>
    <!-- 噪点滤镜叠加 -->
    <div class="noise-overlay"></div>

    <div class="container">
        <header>
            <!-- CyberYimein Logo -->
            <div class="nasa-worm">
                <svg viewBox="0 0 380 60" xmlns="http://www.w3.org/2000/svg" aria-label="CyberYimein">
                    <text x="0" y="48" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="900" font-size="42" letter-spacing="6" fill="#FF3C00" style="text-transform:uppercase">CYBERYIMEIN</text>
                </svg>
            </div>
            <div class="logo" data-i18n="hero.tagline"></div>
            <div class="lang-switch">
                <button data-lang="zh-CN" class="active">ZH</button>
                <button data-lang="en-US">EN</button>
                <button data-lang="ja-JP">JP</button>
            </div>
            <div class="mission-info">
                <span class="mission-id">MISSION: CYBERYIMEIN-26</span>
                <span class="mission-status">STATUS: OPERATIONAL</span>
            </div>
        </header>

        <section id="home" class="hero">
            <div class="hero-text">
                <div class="tagline" data-i18n="hero.tagline"></div>
                <h1 data-i18n="hero.title.html"></h1>
                <p data-i18n="hero.subtitle.html"></p>
            </div>
        </section>

        <section id="projects" class="section">
            <div class="section-header">
                <h2 data-i18n="projects.title"></h2>
                <span class="ref-id">[REF-ID: CYBER-A01]</span>
                <div class="bar"></div>
            </div>
            <div class="projects-grid">
                <div class="project-card empty">
                    <h4 data-i18n="projects.empty.title"></h4>
                    <p data-i18n="projects.empty.desc"></p>
                    <div class="empty-note">placeholder</div>
                </div>
            </div>
        </section>

        <section id="roadmap" class="section">
            <div class="section-header">
                <h2 data-i18n="roadmap.title"></h2>
                <span class="ref-id">[REF-ID: Roadmap-GS]</span>
                <div class="bar"></div>
            </div>
            <div class="archive-cabinet" id="archive-cabinet"></div>
        </section>

        <section id="badges" class="section">
            <div class="section-header">
                <h2 data-i18n="badges.title"></h2>
                <span class="ref-id">[REF-ID: Badge-DB]</span>
                <div class="bar"></div>
            </div>
            <div class="badges-grid"></div>
        </section>

        <section id="contact" class="section" style="margin-top:40px;">
            <div class="section-header">
                <h2 data-i18n="contact.title"></h2>
                <span class="ref-id">[REF-ID: Comms-LK]</span>
                <div class="bar"></div>
            </div>
            <p style="margin:0;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--text-dim);line-height:1.8;">
                <strong style="font-weight:700;">Email:</strong> <a href="mailto:cyberyimein@outlook.com"
                    style="color:var(--text);text-decoration:none;font-weight:700;">cyberyimein@outlook.com</a>
                <span style="margin:0 12px;color:var(--divider);">|</span>
                <strong style="font-weight:700;">GitHub:</strong> <a href="https://github.com/cyberyimein" target="_blank"
                    style="color:var(--text);text-decoration:none;font-weight:700;">@cyberyimein</a>
                <span style="margin:0 12px;color:var(--divider);">|</span>
                <strong style="font-weight:700;">More:</strong> <span data-i18n="contact.placeholder"></span>
            </p>
        </section>

        <footer>
                <p>&copy; <span id="year"></span> <span>Magnus Wong</span> · <span data-i18n="footer.powered"></span>. <span
                    data-i18n="footer.copyright"></span>.</p>
        </footer>

    </div>
    <button id="backToTop" aria-label="Back to top">▲</button>
    <script src="./assets/js/i18n.js"></script>
    <script src="./assets/js/md.js"></script>
    <script src="./assets/js/badges.js"></script>
    <script src="./assets/js/projects.js"></script>
    <script src="./assets/js/roadmap.js"></script>
    <script src="./assets/js/dashboard-fx.js"></script>
    <script src="./assets/js/canvas-bg.js"></script>
    <script src="./assets/js/main.js"></script>
</body>

</html>
